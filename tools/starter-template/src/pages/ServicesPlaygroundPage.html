<h2>GTPLWeb Services</h2>
<p class="muted">Global router + event bus for component coordination.</p>

<section class="grid-2">
  <article class="card">
    <h3>GRouterService</h3>
    <p>Current URL: <b>{{ routeUrl }}</b></p>
    <p>Also try lazy route at <a href="#/lazy">#/lazy</a>.</p>
  </article>

  <article class="card">
    <h3>GBus</h3>
    <div class="buttons">
      <button onclick="{{ emitMessage }}">Emit event</button>
    </div>
    <ul>
      <li g-for="busMessages;idx;msg">#{{ idx }} -> {{ msg }}</li>
    </ul>
  </article>
</section>
