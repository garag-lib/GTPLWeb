<h2>Directivas de GTPLWeb</h2>
<p class="muted">`g-class`, `g-set` y `g-component` en uso combinado.</p>

<section class="grid-2">
  <article class="card">
    <h3>g-class</h3>
    <div g-class="{{ classList }}">Caja con clase dinámica</div>
    <div class="buttons">
      <button onclick="{{ toggleClass }}">Toggle class</button>
    </div>
  </article>

  <article class="card">
    <h3>g-set</h3>
    <p g-set:setTitleValue="{{ injectedTitle }}">Asignación reactiva al controller padre.</p>
    <p>title actual: <b>{{ setTitleValue }}</b></p>
    <div class="buttons">
      <button onclick="{{ randomizeTitle }}">Cambiar title con g-set</button>
    </div>
  </article>

  <article class="card">
    <h3>g-component (dinámico)</h3>
    <div class="buttons">
      <button onclick="{{ setNotice }}">notice-box</button>
      <button onclick="{{ setStats }}">stats-card</button>
      <button onclick="{{ randomizeStats }}">Actualizar stats</button>
      <button onclick="{{ clearDynamic }}">clear</button>
    </div>
    <div g-bind="dynamicHostEl" g-component="{{ currentComponent }}"></div>
  </article>

</section>
